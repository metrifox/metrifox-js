version: 2

updates:
  # npm dependencies (including vulnerability updates)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "04:00"
    open-pull-requests-limit: 10  
    groups:
      # Group React ecosystem together
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"

      # Testing tools
      testing-tools:
        patterns:
          - "jest*"
          - "@testing-library*"

      # For internal Metrifox packages 
      metrifox-internal:
        patterns:
          - "@metrifox/*"

      # Group all minor/patch updates together to reduce PR noise
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "04:00"  
    groups:
      actions:
        patterns:
          - "*"                  # Group all Actions updates into one PR
