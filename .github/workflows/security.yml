name: Security

on:
  pull_request:
    branches: [main]

# Least-privilege default; individual jobs widen scope only where required.
permissions:
  contents: read

jobs:
  # Blocks a PR that ADDS (or bumps to) a dependency with a known high/critical
  # advisory. Operates on the PR diff, so reviewers get a clear "this change
  # introduced the vuln" signal.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      # Pinned to a full commit SHA to defend against supply-chain attacks via
      # mutated tags. Update SHAs deliberately (e.g. with Dependabot).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Fail the check on any newly introduced high or critical advisory.
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # Auto-discovers EVERY package-lock.json in the repo, so a newly added nested
  # folder is covered automatically — no hardcoded path list to forget (which is
  # how the demo/ blind spot happened). Shipped paths BLOCK the PR; test / demo /
  # example / blind-spot paths are report-only (surfaced, non-blocking).
  # npm audit reads the lockfile only — no install/lifecycle scripts run, keeping
  # CI itself off the supply-chain attack surface.
  npm-audit:
    name: npm audit (high/critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Audit every package-lock.json (block shipped, report-only test/demo)
        shell: bash
        run: |
          set -uo pipefail
          shipped_failed=0
          while IFS= read -r lock; do
            dir=$(dirname "$lock")
            # Classify the directory: test/demo/example/blind-spot => report-only.
            case "$dir" in
              *demo*|*example*|*e2e*|*fixture*|*sample*|*test*|*spec*) mode=report-only ;;
              *) mode=blocking ;;
            esac
            echo "::group::npm audit ($mode): $dir"
            if (cd "$dir" && npm audit --audit-level=high); then
              echo "clean: $dir"
            elif [ "$mode" = blocking ]; then
              echo "::error::high/critical vulnerabilities in shipped path: $dir"
              shipped_failed=1
            else
              echo "::warning::high/critical vulnerabilities in report-only path: $dir (not blocking)"
            fi
            echo "::endgroup::"
          done < <(find . -name package-lock.json -not -path '*/node_modules/*' | sort)
          exit $shipped_failed

  # Static analysis (SAST) for the SDK source — catches injection/insecure
  # patterns in our own code, complementing the dependency checks above.
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
