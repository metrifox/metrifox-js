name: Security

on:
  pull_request:
    branches: [main]

# Least-privilege default; individual jobs widen scope only where required.
permissions:
  contents: read

jobs:
  # Blocks a PR that ADDS (or bumps to) a dependency with a known high/critical
  # advisory. Operates on the PR diff, so reviewers get a clear "this change
  # introduced the vuln" signal.
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      # Pinned to a full commit SHA to defend against supply-chain attacks via
      # mutated tags. Update SHAs deliberately (e.g. with Dependabot).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Review dependency changes
        uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3675e383bb1769c019 # v4.5.0
        with:
          # Fail the check on any newly introduced high or critical advisory.
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # Audits the FULL resolved dependency tree (not just the PR diff) so a PR is
  # also blocked when an already-present transitive package is found vulnerable.
  npm-audit:
    name: npm audit (high/critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      # `npm ci` is intentionally omitted: the audit reads package-lock.json and
      # never executes install/lifecycle scripts, keeping CI itself off the
      # supply-chain attack surface.
      - name: Audit production + dev dependencies
        run: npm audit --audit-level=high

  # Audits the demo app (demo/) for visibility. Report-only (continue-on-error)
  # and intentionally NOT a required check: the demo is not installable today
  # (it pins @metrifox/react-sdk@^1.x, since superseded by 2.x) and its vite
  # high needs a major bump, so blocking PRs on it would be a false gate. Flip
  # to blocking once the demo is modernized.
  npm-audit-demo:
    name: npm audit (demo, report-only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'

      # Reads demo/package-lock.json only — no install/lifecycle scripts.
      - name: Audit demo dependencies
        working-directory: ./demo
        run: npm audit --audit-level=high

  # Static analysis (SAST) for the SDK source — catches injection/insecure
  # patterns in our own code, complementing the dependency checks above.
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@df409f7d9260372bd5f19e5b04e83cb3c43714ae # v3.27.9
        with:
          languages: javascript-typescript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@df409f7d9260372bd5f19e5b04e83cb3c43714ae # v3.27.9
